# project.yml — XcodeGen spec for the ASL iOS app.
# Generate the Xcode project with:  xcodegen generate   (run in this directory)
#
# Placeholders that need real values before device builds (Xcode-side setup):
#   - bundle id prefix / team (signing)
#   - the app group id (must exist in the developer portal and match
#     AppGroup.identifier + ShareViewController.appGroupID)
#   - ASLAPIBaseURL / ASLFrontendHost for the target environment

name: ASL

options:
  bundleIdPrefix: com.staccato
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Strict concurrency everywhere; PacingKit gets it implicitly from
    # swift-tools-version 6.0.
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic

packages:
  PacingKit:
    path: PacingKit

targets:
  ASL:
    type: application
    platform: iOS
    sources:
      - path: ASL
    dependencies:
      - package: PacingKit
      - target: ShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.staccato.asl
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    entitlements:
      path: ASL/ASL.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.staccato.asl
    info:
      path: ASL/Info.plist
      properties:
        CFBundleDisplayName: ASL
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        # App configuration (read by AppConfig.swift)
        ASLAPIBaseURL: "https://api.staccato.example"
        ASLFrontendHost: "staccato.example"
        # Live capture — copy must stay measurement-only and mention
        # on-device processing.
        NSCameraUsageDescription: >-
          ASL uses the camera to measure how often the picture on a screen
          changes. All detection runs on your iPhone; no video ever leaves
          the device.
        # Deep links: asl://scan?url=...
        CFBundleURLTypes:
          - CFBundleURLName: com.staccato.asl
            CFBundleURLSchemes:
              - asl

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.staccato.asl.share
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.staccato.asl
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Scan with ASL
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true

  ASLTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ASLTests
    dependencies:
      - target: ASL

schemes:
  ASL:
    build:
      targets:
        ASL: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ASLTests
        # PacingKit's golden-vector tests also run here via the package scheme;
        # on CI, additionally run `swift test` inside PacingKit/ (works on
        # macOS and Linux — no simulator needed).
    profile:
      config: Release
    archive:
      config: Release
