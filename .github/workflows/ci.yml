name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: staccato-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: staccato
          POSTGRES_PASSWORD: staccato
          POSTGRES_DB: staccato_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U staccato" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install uv
          uv pip install --system -e '.[dev]'
      - name: Fast tests (golden vectors, API, entitlements)
        run: pytest -m "not slow" -q
      - name: Slow tests (synthetic clips, inline pipeline)
        run: pytest -m slow -q
      - name: Entitlement row-lock race (Postgres)
        env:
          STACCATO_TEST_PG_DSN: postgresql+asyncpg://staccato:staccato@localhost:5432/staccato_test
        run: pytest tests/test_entitlements_concurrency.py -q

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [staccato-frontend, staccato-admin]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
